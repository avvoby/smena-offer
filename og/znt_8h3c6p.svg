<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060E1D"/>
      <stop offset="100%" stop-color="#0D1525"/>
    </linearGradient>
  </defs>
  <!-- Фон -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Клубная полоса слева -->
  <rect width="8" height="630" fill="#0051A5"/>
  <!-- Верхняя полоса -->
  <rect y="0" width="1200" height="2" fill="#0051A5" opacity="0.4"/>

  <!-- Логотип Смены -->
  <rect x="60" y="60" width="52" height="52" fill="#F4EDDC" rx="4"/>
  <rect x="60" y="60" width="24" height="24" fill="#060E1D" rx="2"/>
  <rect x="88" y="88" width="24" height="24" fill="#060E1D" rx="2"/>

  <!-- Яндекс Смена -->
  <text x="130" y="92" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#F4EDDC" letter-spacing="1">ЯНДЕКС СМЕНА</text>

  <!-- Разделитель -->
  <line x1="60" y1="148" x2="1140" y2="148" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Персональное предложение -->
  <text x="60" y="210" font-family="Arial,sans-serif" font-size="18" fill="#0051A5" font-weight="600" letter-spacing="2" opacity="0.9">ПЕРСОНАЛЬНОЕ ПРЕДЛОЖЕНИЕ</text>

  <!-- Название арены -->
  <text x="60" y="310" font-family="Arial,sans-serif" font-size="72" font-weight="900" fill="white">Газпром Арена</text>

  <!-- Название клуба -->
  <text x="60" y="380" font-family="Arial,sans-serif" font-size="36" font-weight="400" fill="rgba(255,255,255,0.65)">ФК Зенит</text>

  <!-- Разделитель нижний -->
  <line x1="60" y1="440" x2="400" y2="440" stroke="#0051A5" stroke-width="2"/>

  <!-- Описание -->
  <text x="60" y="490" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.5)">Единое окно для управления персоналом арены</text>

  <!-- Домен -->
  <text x="60" y="572" font-family="Arial,sans-serif" font-size="18" fill="rgba(255,255,255,0.3)">yandexsmena-offer.ru</text>
</svg>